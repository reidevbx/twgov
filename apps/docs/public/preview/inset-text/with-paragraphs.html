<!DOCTYPE html>
<html lang="zh-TW" data-theme="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>補充說明 — gov.tw Design System</title>
  <link rel="stylesheet" href="/tokens.css">
  <script src="/gov-tw.iife.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: var(--govtw-font-sans, system-ui, -apple-system, sans-serif);
      color: var(--govtw-color-text-primary);
      background-color: var(--govtw-color-bg-canvas);
      margin: 0;
      padding: 40px;
      line-height: 1.6;
    }
    .demo-layout {
      display: flex;
      flex-direction: column;
      flex-wrap: wrap;
      align-items: stretch;
      gap: 12px;
    }
  </style>
</head>
<body>
  <div class="demo-layout">
    <govtw-inset-text>
      <p>線上申辦系統每日 06:00–24:00 開放，凌晨進行系統維護。</p>
      <p>如需臨櫃申辦，請於上班時段（週一至週五 08:30–17:30）前往。詳情請參閱 <govtw-link href="#">服務時間說明</govtw-link>。</p>
    </govtw-inset-text>
  </div>
</body>
</html>
