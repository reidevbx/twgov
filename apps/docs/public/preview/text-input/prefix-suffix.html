<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Text Input 文字輸入 — gov.tw Design System</title>
  <link rel="stylesheet" href="/tokens.css">
  <script src="/gov-tw.iife.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: var(--govtw-font-sans, system-ui, -apple-system, sans-serif);
      color: var(--govtw-color-text-primary);
      background-color: var(--govtw-color-bg-canvas);
      margin: 0;
      padding: 40px;
      line-height: 1.6;
    }
    .demo-layout {
      display: flex;
      flex-direction: column;
      flex-wrap: wrap;
      align-items: stretch;
      gap: 12px;
    }
  </style>
</head>
<body>
  <div class="demo-layout">
    <govtw-stack space="4">
      <govtw-input label="金額" prefix="NT$" width="10"></govtw-input>
      <govtw-input label="重量" suffix="公斤" width="5"></govtw-input>
      <govtw-cluster space="4">
        <govtw-input label="費率" prefix="NT$" suffix="每月" width="10"></govtw-input>
      </govtw-cluster>
    </govtw-stack>
  </div>
</body>
</html>
