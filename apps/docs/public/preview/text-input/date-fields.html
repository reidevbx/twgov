<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Text Input 文字輸入 — gov.tw Design System</title>
  <link rel="stylesheet" href="/tokens.css">
  <script src="/gov-tw.iife.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: var(--govtw-font-sans, system-ui, -apple-system, sans-serif);
      color: var(--govtw-color-text-primary);
      background-color: var(--govtw-color-bg-canvas);
      margin: 0;
      padding: 40px;
      line-height: 1.6;
    }
    .demo-layout {
      display: flex;
      flex-direction: column;
      flex-wrap: wrap;
      align-items: stretch;
      gap: 12px;
    }
  </style>
</head>
<body>
  <div class="demo-layout">
    <govtw-fieldset>
      <h2 slot="legend">出生日期</h2>
      <p slot="hint">例如：1990 年 3 月 15 日</p>
      <govtw-cluster space="3">
        <govtw-text-input label="年" width="4" inputmode="numeric"></govtw-text-input>
        <govtw-text-input label="月" width="2" inputmode="numeric"></govtw-text-input>
        <govtw-text-input label="日" width="2" inputmode="numeric"></govtw-text-input>
      </govtw-cluster>
    </govtw-fieldset>
  </div>
</body>
</html>
