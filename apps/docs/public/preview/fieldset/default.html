<!DOCTYPE html>
<html lang="zh-TW" data-theme="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Fieldset 欄位群組 — gov.tw Design System</title>
  <link rel="stylesheet" href="/tokens.css">
  <script src="/gov-tw.iife.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: var(--govtw-font-sans, system-ui, -apple-system, sans-serif);
      color: var(--govtw-color-text-primary);
      background-color: var(--govtw-color-bg-canvas);
      margin: 0;
      padding: 40px;
      line-height: 1.6;
    }
    .demo-layout {
      display: flex;
      flex-direction: column;
      flex-wrap: wrap;
      align-items: stretch;
      gap: 12px;
    }
  </style>
</head>
<body>
  <div class="demo-layout">
    <govtw-fieldset>
      <h2 slot="legend">聯絡資訊</h2>
      <govtw-text-input label="姓名" name="name"></govtw-text-input>
      <govtw-text-input label="電子信箱" name="email" type="email" hint="例如：user@example.gov.tw"></govtw-text-input>
      <govtw-text-input label="電話" name="phone" type="tel" width="10"></govtw-text-input>
    </govtw-fieldset>
  </div>
</body>
</html>
