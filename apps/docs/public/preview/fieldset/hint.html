<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Fieldset 欄位群組 — gov.tw Design System</title>
  <link rel="stylesheet" href="/tokens.css">
  <script src="/gov-tw.iife.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: var(--govtw-font-sans, system-ui, -apple-system, sans-serif);
      color: var(--govtw-color-text-primary);
      background-color: var(--govtw-color-bg-canvas);
      margin: 0;
      padding: 40px;
      line-height: 1.6;
    }
    .demo-layout {
      display: flex;
      flex-direction: column;
      flex-wrap: wrap;
      align-items: stretch;
      gap: 12px;
    }
  </style>
</head>
<body>
  <div class="demo-layout">
    <govtw-fieldset>
      <h2 slot="legend">寄送地址</h2>
      <p slot="hint">請填寫您希望收到文件的地址</p>
      <govtw-text-input label="縣市" width="10"></govtw-text-input>
      <govtw-text-input label="區鄉鎮市" width="10"></govtw-text-input>
      <govtw-text-input label="街道地址"></govtw-text-input>
    </govtw-fieldset>
  </div>
</body>
</html>
