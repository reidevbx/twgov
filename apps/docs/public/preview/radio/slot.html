<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Radio 使用 Slot — gov.tw Design System</title>
  <link rel="stylesheet" href="/tokens.css">
  <script src="/gov-tw.iife.js"></script>
  <style>
    body {
      font-family: var(--govtw-font-sans, system-ui, -apple-system, sans-serif);
      color: var(--govtw-color-text-primary);
      background-color: var(--govtw-color-bg-canvas);
      margin: 0;
      padding: 40px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <govtw-radio name="terms" value="agree">我同意<govtw-link href="#">服務條款</govtw-link>中的所有內容</govtw-radio>
  <govtw-radio name="terms" value="disagree">我不同意</govtw-radio>
</body>
</html>
