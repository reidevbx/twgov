<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Radio 單選按鈕 — gov.tw Design System</title>
  <link rel="stylesheet" href="/tokens.css">
  <script src="/gov-tw.iife.js"></script>
  <style>
    body {
      font-family: var(--govtw-font-sans, system-ui, -apple-system, sans-serif);
      color: var(--govtw-color-text-primary);
      background-color: var(--govtw-color-bg-canvas);
      margin: 0;
      padding: 40px;
      line-height: 1.6;
    }
    .group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 640px;
    }
  </style>
</head>
<body>
  <div class="group">
    <govtw-radio name="contact" value="email" label="電子郵件" checked></govtw-radio>
    <govtw-radio name="contact" value="phone" label="電話"></govtw-radio>
    <govtw-radio name="contact" value="mail" label="郵寄"></govtw-radio>
  </div>
</body>
</html>
