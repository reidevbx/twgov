<!DOCTYPE html>
<html lang="zh-TW" data-theme="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Select 選擇清單 — gov.tw Design System</title>
  <link rel="stylesheet" href="/tokens.css">
  <script src="/gov-tw.iife.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: var(--govtw-font-sans, system-ui, -apple-system, sans-serif);
      color: var(--govtw-color-text-primary);
      background-color: var(--govtw-color-bg-canvas);
      margin: 0;
      padding: 40px;
      line-height: 1.6;
    }
    .demo-layout {
      display: flex;
      flex-direction: column;
      flex-wrap: wrap;
      align-items: stretch;
      gap: 12px;
    }
  </style>
</head>
<body>
  <div class="demo-layout">
    <govtw-select label="居住縣市" name="city">
      <option value="">請選擇</option>
      <option value="taipei">臺北市</option>
      <option value="newtaipei">新北市</option>
      <option value="taoyuan">桃園市</option>
      <option value="taichung">臺中市</option>
      <option value="tainan">臺南市</option>
      <option value="kaohsiung">高雄市</option>
    </govtw-select>
  </div>
</body>
</html>
